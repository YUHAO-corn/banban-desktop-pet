<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Desktop Pet Widget - Raccoon</title>
<style>
  /* 宿主框架（Electron/Tauri）应将窗口设置为透明 + 无边框 + 置顶 + 鼠标穿透
     body 透明背景仅用于浏览器预览，真实部署时由宿主负责透明化 */
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  #pet-container {
    position: relative;
    width: 360px;
    height: 320px;
    user-select: none;
  }
  #pet-svg {
    position: absolute;
    left: 0;
    top: 0;
    overflow: visible;
    z-index: 1;
  }
  #ui-elements {
    position: absolute;
    top: 224px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 6;
    align-items: center;
  }
  #stress-display {
    background: rgba(28, 26, 24, 0.92);
    padding: 5px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #stress-display .label {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  #stress-num {
    font-size: 13px;
    font-weight: 500;
    color: #A8D88C;
    font-family: monospace;
  }
  #settings-btn {
    background: rgba(28, 26, 24, 0.92);
    border: none;
    padding: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #settings-menu {
    display: none;
    position: absolute;
    bottom: 82px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border: 2px solid #1a1a1a;
    border-radius: 10px;
    padding: 12px 14px;
    min-width: 220px;
    z-index: 20;
    font-size: 13px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.14);
  }
  #settings-menu .menu-item {
    width: 100%;
    text-align: left;
    padding: 8px 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #1a1a1a;
  }
  #settings-menu .menu-item:hover { background: #f0f0f0; }
  #settings-menu .menu-item svg { flex: 0 0 auto; }
  #camera-toggle-btn.is-off { color: #8a3b2e; }
  #camera-toggle-btn.is-off svg { opacity: 0.75; }
  #settings-menu .divider { border-top: 1px solid #e0e0e0; margin: 6px 0; }
  #settings-menu .scale-row {
    margin-bottom: 8px;
  }
  #settings-menu .scale-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    color: #555;
    font-size: 12px;
  }
  #settings-menu input[type=range] { width: 100%; }
  #speech-bubble {
    display: none;
    position: absolute;
    left: 50%;
    top: 30px;
    transform: translateX(-30%);
    background: white;
    border: 2.5px solid #1a1a1a;
    border-radius: 14px;
    padding: 10px 14px 12px 14px;
    max-width: 220px;
    font-size: 13px;
    line-height: 1.5;
    color: #1a1a1a;
    z-index: 10;
  }
  #speech-text { padding-right: 14px; margin-bottom: 8px; }
  #speech-bubble .accept-btn {
    background: #1a1a1a;
    color: white;
    border: none;
    padding: 4px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
  }
  #speech-bubble .dismiss-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 18px;
    height: 18px;
    padding: 0;
    border: none;
    background: transparent;
    font-size: 12px;
    cursor: pointer;
    color: #aaa;
    line-height: 1;
  }
</style>
</head>
<body>

<script>
(function() {
'use strict';

// =========================================================================
// 桌面宠物 UI 模块 - 浣熊版
// 详细规范见 pet-widget-spec.md
// =========================================================================

// ---------- DOM 引用 ----------
const stressNum = document.getElementById('stress-num');
const speechBubble = document.getElementById('speech-bubble');
const speechText = document.getElementById('speech-text');
const cardArmGroup = document.getElementById('card-arm');
const warningCard = document.getElementById('warning-card');
const cardText = document.getElementById('card-text');
const sweatDrops = document.getElementById('sweat-drops');
const raccoonBody = document.getElementById('raccoon-body');
const raccoonNormal = document.getElementById('raccoon');
const raccoonConfused = document.getElementById('confused-raccoon');
const leftPupil = document.getElementById('left-pupil');
const rightPupil = document.getElementById('right-pupil');
const leftShine = document.getElementById('left-shine');
const rightShine = document.getElementById('right-shine');
const leftEyeNormal = document.getElementById('left-eye-normal');
const rightEyeNormal = document.getElementById('right-eye-normal');
const happyEyes = document.getElementById('happy-eyes');
const mouthPath = document.getElementById('mouth-path');
const settingsMenu = document.getElementById('settings-menu');
const feedbackHearts = document.getElementById('feedback-hearts');
const petSvg = document.getElementById('pet-svg');
const uiElements = document.getElementById('ui-elements');

// ---------- 状态 ----------
const state = {
  frame: 0,
  stress: 20,
  cameraStatus: 'ok',
  cameraEnabled: true,
  speechVisible: false,
  lastSpeechTrigger: 0,
  blindTriggerTimer: 0,
  happyTimer: 0,
  heartAnimFrame: 0,
  heartAnimActive: false,
  autoSpeechEnabled: true
};

let messages = {
  low: ['你今天看起来不错', '保持这个状态啊', '我在偷偷看你呢～'],
  mid: ['有点紧张了哦', '休息一下？', '来，深呼吸'],
  high: ['🟨 黄牌警告！\n你压力太大了', '🟥 红牌！\n现在必须休息', '裁判我来了\n请你下场冷静'],
  blind: [
    '咦？看不到你了…\n摄像头是不是被挡住啦？',
    '你跑哪去了？\n摄像头可能出问题啦',
    '这里黑黑的什么都看不见…\n检查一下摄像头吧'
  ],
  off: [
    '摄像头已经关掉啦\n我先不偷看你了',
    '收到，我把摄像头关上\n需要时再叫我'
  ]
};

const callbacks = {
  petClick: [],
  speechAccept: [],
  speechDismiss: [],
  openMonitor: [],
  cameraToggle: [],
  animalScaleChange: [],
  uiScaleChange: []
};

function getMood(stress) {
  if (stress < 33) return 0;
  if (stress < 66) return 1;
  if (stress < 85) return 2;
  return 3;
}

// ---------- 说话 ----------
function triggerSpeechInternal(customMessage) {
  let msg;
  if (customMessage) {
    msg = customMessage;
  } else {
    let pool;
    if (state.cameraStatus === 'blind') {
      pool = messages.blind;
    } else if (state.cameraStatus === 'off') {
      pool = messages.off;
    } else {
      if (state.stress < 33) pool = messages.low;
      else if (state.stress < 66) pool = messages.mid;
      else pool = messages.high;
    }
    if (!pool || pool.length === 0) return;
    msg = pool[Math.floor(Math.random() * pool.length)];
  }
  speechText.innerHTML = msg.replace(/\n/g, '<br>');
  speechBubble.style.display = 'block';
  state.speechVisible = true;
}

function dismissSpeech() {
  speechBubble.style.display = 'none';
  state.speechVisible = false;
  state.lastSpeechTrigger = Date.now();
  callbacks.speechDismiss.forEach(cb => cb());
}

function acceptSpeech() {
  speechBubble.style.display = 'none';
  state.speechVisible = false;
  state.lastSpeechTrigger = Date.now();
  // 触发正反馈：眯眼笑 + 爱心飘散（仅在非 blind 状态）
  if (state.cameraStatus !== 'blind') {
    state.happyTimer = 60;
    state.heartAnimActive = true;
    state.heartAnimFrame = 0;
  }
  callbacks.speechAccept.forEach(cb => cb());
}

document.getElementById('speech-dismiss-btn').addEventListener('click', dismissSpeech);
document.getElementById('speech-accept-btn').addEventListener('click', acceptSpeech);

// ---------- 设置菜单 ----------
document.getElementById('settings-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  settingsMenu.style.display = settingsMenu.style.display === 'none' ? 'block' : 'none';
});

document.addEventListener('click', (e) => {
  if (!settingsMenu.contains(e.target) && e.target.id !== 'settings-btn') {
    settingsMenu.style.display = 'none';
  }
});

document.getElementById('open-monitor-btn').addEventListener('click', () => {
  callbacks.openMonitor.forEach(cb => cb());
  settingsMenu.style.display = 'none';
});

const cameraToggleBtn = document.getElementById('camera-toggle-btn');
const cameraToggleLabel = document.getElementById('camera-toggle-label');

function applyCameraEnabled(enabled) {
  state.cameraEnabled = !!enabled;
  cameraToggleBtn.classList.toggle('is-off', !state.cameraEnabled);
  cameraToggleLabel.textContent = state.cameraEnabled ? '关闭摄像头' : '打开摄像头';
}

cameraToggleBtn.addEventListener('click', () => {
  const nextEnabled = !state.cameraEnabled;
  applyCameraEnabled(nextEnabled);
  callbacks.cameraToggle.forEach(cb => cb(nextEnabled));
  if (!nextEnabled) {
    window.PetWidget.setCameraStatus('off');
  }
  settingsMenu.style.display = 'none';
});

const animalScale = document.getElementById('animal-scale');
const uiScale = document.getElementById('ui-scale');

function applyAnimalScale(v) {
  petSvg.style.transform = `scale(${v})`;
  petSvg.style.transformOrigin = '180px 206px';
  document.getElementById('animal-scale-val').textContent = v.toFixed(1) + '×';
  animalScale.value = v;
}

function applyUIScale(v) {
  uiElements.style.transform = `translateX(-50%) scale(${v})`;
  uiElements.style.transformOrigin = 'center top';
  document.getElementById('ui-scale-val').textContent = v.toFixed(1) + '×';
  uiScale.value = v;
}

animalScale.addEventListener('input', () => {
  const v = parseFloat(animalScale.value);
  applyAnimalScale(v);
  callbacks.animalScaleChange.forEach(cb => cb(v));
});

uiScale.addEventListener('input', () => {
  const v = parseFloat(uiScale.value);
  applyUIScale(v);
  callbacks.uiScaleChange.forEach(cb => cb(v));
});

// ---------- 浣熊点击 ----------
petSvg.addEventListener('click', (e) => {
  // 仅在摄像头可用状态下触发
  if (state.cameraStatus !== 'ok') return;
  callbacks.petClick.forEach(cb => cb());
});

// ---------- 主渲染循环 ----------
function updateScene() {
  // ===== 摄像头 blind/off 状态 =====
  if (state.cameraStatus === 'blind' || state.cameraStatus === 'off') {
    const sway = Math.sin(state.frame * 0.05) * 8;
    raccoonConfused.setAttribute('transform', `translate(${sway}, ${Math.sin(state.frame * 0.04) * 2})`);
    const qm = document.getElementById('question-mark');
    if (qm) qm.style.opacity = (Math.sin(state.frame * 0.08) + 1) / 2;
    stressNum.textContent = state.cameraStatus === 'off' ? 'OFF' : '---';
    stressNum.style.color = state.cameraStatus === 'off' ? '#FFB870' : '#888';

    if (state.cameraStatus === 'off') {
      return;
    }

    if (state.blindTriggerTimer > 0) {
      state.blindTriggerTimer--;
      if (state.blindTriggerTimer === 0 && !state.speechVisible && state.autoSpeechEnabled) {
        triggerSpeechInternal();
      }
    }
    if (state.autoSpeechEnabled && !state.speechVisible && Date.now() - state.lastSpeechTrigger > 15000) {
      triggerSpeechInternal();
    }
    return;
  }

  const stress = state.stress;
  const mood = getMood(stress);

  // ===== 数值显示 =====
  stressNum.textContent = String(stress).padStart(3, '0');
  let valueColor;
  if (stress < 33) valueColor = '#A8D88C';
  else if (stress < 66) valueColor = '#FFE898';
  else if (stress < 85) valueColor = '#FFB870';
  else valueColor = '#FF8888';
  stressNum.style.color = valueColor;

  // ===== 浣熊主体动画 =====
  let bodyTransform = '';
  if (mood === 0) {
    const breathe = Math.sin(state.frame * 0.04) * 1.5;
    bodyTransform = `translate(0, ${breathe})`;
  } else if (mood === 1) {
    const breathe = Math.sin(state.frame * 0.05) * 1.5;
    const subtleSway = Math.sin(state.frame * 0.02) * 1;
    bodyTransform = `translate(${subtleSway}, ${breathe})`;
  } else if (mood === 2) {
    const breathe = Math.sin(state.frame * 0.08) * 2;
    const shake = Math.sin(state.frame * 0.4) * 0.8;
    bodyTransform = `translate(${shake}, ${breathe})`;
  } else {
    const shake = Math.sin(state.frame * 0.6) * 2;
    const shakeY = Math.cos(state.frame * 0.5) * 1.5;
    bodyTransform = `translate(${shake}, ${shakeY})`;
  }
  raccoonBody.setAttribute('transform', bodyTransform);

  // ===== 正反馈：眯眼笑 =====
  if (state.happyTimer > 0) {
    leftEyeNormal.style.display = 'none';
    rightEyeNormal.style.display = 'none';
    happyEyes.style.display = 'block';
    state.happyTimer--;
  } else {
    leftEyeNormal.style.display = 'block';
    rightEyeNormal.style.display = 'block';
    happyEyes.style.display = 'none';
  }

  // ===== 瞳孔 =====
  const pupilSize = Math.max(1.5, 3 - (stress / 100) * 1.5);
  leftPupil.setAttribute('r', pupilSize);
  rightPupil.setAttribute('r', pupilSize);

  // ===== 眨眼 =====
  if (state.happyTimer === 0) {
    const blinkFreq = mood >= 2 ? 60 : 200;
    const blinkDur = mood >= 2 ? 5 : 8;
    const blinking = state.frame % blinkFreq < blinkDur;
    leftPupil.style.opacity = blinking ? '0' : '1';
    rightPupil.style.opacity = blinking ? '0' : '1';
    leftShine.style.opacity = blinking ? '0' : '1';
    rightShine.style.opacity = blinking ? '0' : '1';
  }

  // ===== 嘴巴 =====
  if (state.happyTimer > 0) {
    mouthPath.setAttribute('d', 'M 180 187 Q 175 192 170 188');
  } else if (mood === 0) {
    mouthPath.setAttribute('d', 'M 180 187 Q 175 191 171 188');
  } else if (mood === 1) {
    mouthPath.setAttribute('d', 'M 180 188 Q 175 189 172 188');
  } else if (mood === 2) {
    mouthPath.setAttribute('d', 'M 180 188 Q 175 187 171 189');
  } else {
    mouthPath.setAttribute('d', 'M 180 189 Q 175 186 171 190');
  }

  // ===== 黄牌/红牌 =====
  if (mood === 2) {
    cardArmGroup.style.display = 'block';
    warningCard.setAttribute('fill', '#FFD43B');
    cardText.textContent = '!';
    cardText.setAttribute('fill', '#1a1a1a');
    const shake = Math.sin(state.frame * 0.3) * 0.5;
    cardArmGroup.setAttribute('transform', `translate(${shake}, 0)`);
  } else if (mood === 3) {
    cardArmGroup.style.display = 'block';
    warningCard.setAttribute('fill', '#E24B4A');
    cardText.textContent = '!';
    cardText.setAttribute('fill', '#FAFAFA');
    const shake = Math.sin(state.frame * 0.5) * 1.5;
    const shakeY = Math.sin(state.frame * 0.4) * 0.8;
    cardArmGroup.setAttribute('transform', `translate(${shake}, ${shakeY})`);
  } else {
    cardArmGroup.style.display = 'none';
  }

  // ===== 冒汗 =====
  if (mood >= 1 && mood <= 2) {
    sweatDrops.style.display = 'block';
    const dropOffset = (state.frame % 60) * 0.3;
    document.getElementById('sweat1').setAttribute('cy', 158 + dropOffset);
    document.getElementById('sweat1').style.opacity = Math.max(0, 1 - (state.frame % 60) / 60);
    document.getElementById('sweat2').setAttribute('cy', 160 + dropOffset);
    document.getElementById('sweat2').style.opacity = Math.max(0, 1 - (state.frame % 60) / 60);
  } else {
    sweatDrops.style.display = 'none';
  }

  // ===== 正反馈：爱心飘散 =====
  if (state.heartAnimActive) {
    feedbackHearts.style.display = 'block';
    state.heartAnimFrame++;
    const total = 90;
    const t = state.heartAnimFrame / total;
    if (t >= 1) {
      state.heartAnimActive = false;
      feedbackHearts.style.display = 'none';
    } else {
      const opacity = 1 - t;
      const yOffset = -t * 50;
      document.getElementById('heart1').setAttribute('transform', `translate(0, ${yOffset}) scale(${1 + t * 0.3})`);
      document.getElementById('heart1').style.opacity = opacity;
      document.getElementById('heart2').setAttribute('transform', `translate(${-t * 12}, ${yOffset * 0.8 - 5}) scale(${0.7 + t * 0.2})`);
      document.getElementById('heart2').style.opacity = opacity;
      document.getElementById('heart3').setAttribute('transform', `translate(${t * 12}, ${yOffset * 0.8 - 5}) scale(${0.7 + t * 0.2})`);
      document.getElementById('heart3').style.opacity = opacity;
    }
  } else {
    feedbackHearts.style.display = 'none';
  }

  // ===== 自动触发说话 =====
  if (state.autoSpeechEnabled
      && stress >= 65
      && !state.speechVisible
      && Date.now() - state.lastSpeechTrigger > 8000) {
    triggerSpeechInternal();
  }
}

function loop() {
  state.frame++;
  updateScene();
  requestAnimationFrame(loop);
}

loop();

// ---------- 公开 API ----------
window.PetWidget = {
  setStress(value) {
    state.stress = Math.max(0, Math.min(100, Number(value) || 0));
  },

  setCameraStatus(status) {
    if (status !== 'ok' && status !== 'blind' && status !== 'off') return;
    if (state.cameraStatus === status) return;
    applyCameraEnabled(status !== 'off');
    state.cameraStatus = status;
    if (status === 'blind' || status === 'off') {
      raccoonNormal.style.display = 'none';
      raccoonConfused.style.display = 'block';
      stressNum.textContent = status === 'off' ? 'OFF' : '---';
      stressNum.style.color = status === 'off' ? '#FFB870' : '#888';
      state.blindTriggerTimer = status === 'blind' ? 120 : 0; // 2 秒后说话
      if (state.speechVisible) dismissSpeech();
    } else {
      raccoonNormal.style.display = 'block';
      raccoonConfused.style.display = 'none';
      state.blindTriggerTimer = 0;
      if (state.speechVisible) dismissSpeech();
    }
  },

  triggerSpeech(message) {
    triggerSpeechInternal(message);
  },

  dismissSpeech() {
    if (state.speechVisible) dismissSpeech();
  },

  setMessages(newMessages) {
    if (newMessages && typeof newMessages === 'object') {
      messages = {
        low: newMessages.low || messages.low,
        mid: newMessages.mid || messages.mid,
        high: newMessages.high || messages.high,
        blind: newMessages.blind || messages.blind,
        off: newMessages.off || messages.off
      };
    }
  },

  setAutoSpeech(enabled) {
    state.autoSpeechEnabled = !!enabled;
  },

  setCameraEnabled(enabled) {
    applyCameraEnabled(!!enabled);
    if (!enabled) {
      window.PetWidget.setCameraStatus('off');
    }
  },

  setAnimalScale(value) {
    const v = Math.max(0.5, Math.min(1.5, Number(value) || 1));
    applyAnimalScale(v);
  },

  setUIScale(value) {
    const v = Math.max(0.5, Math.min(1.5, Number(value) || 1));
    applyUIScale(v);
  },

  onPetClick(cb) { if (typeof cb === 'function') callbacks.petClick.push(cb); },
  onSpeechAccept(cb) { if (typeof cb === 'function') callbacks.speechAccept.push(cb); },
  onSpeechDismiss(cb) { if (typeof cb === 'function') callbacks.speechDismiss.push(cb); },
  onOpenMonitor(cb) { if (typeof cb === 'function') callbacks.openMonitor.push(cb); },
  onCameraToggle(cb) { if (typeof cb === 'function') callbacks.cameraToggle.push(cb); },
  onAnimalScaleChange(cb) { if (typeof cb === 'function') callbacks.animalScaleChange.push(cb); },
  onUIScaleChange(cb) { if (typeof cb === 'function') callbacks.uiScaleChange.push(cb); },

  getState() {
    return { ...state };
  }
};

})();
</script>

<!-- Electron 桥接（非 Electron 环境下自动跳过） -->
<script>
if (window.electronAPI) {
  // 接收压力数据
  window.electronAPI.onStressUpdate((data) => {
    window.PetWidget.setStress(data.stress_score || 0);
  });

  // 接收摄像头状态
  window.electronAPI.onCameraStatus((status) => {
    window.PetWidget.setCameraStatus(status);
  });

  window.electronAPI.onCameraEnabled((enabled) => {
    window.PetWidget.setCameraEnabled(enabled);
  });

  // 关闭自动说话 — Electron 主进程控制提醒时机
  window.PetWidget.setAutoSpeech(false);

  // 气泡"好的"按钮 → 通知主进程（进入冷却）
  window.PetWidget.onSpeechAccept(() => {
    window.electronAPI.speechAccepted();
  });

  // 气泡 ✕ 按钮 → 通知主进程（进入冷却）
  window.PetWidget.onSpeechDismiss(() => {
    window.electronAPI.speechDismissed();
  });

  // 设置菜单"打开 Monitor" → 通知主进程
  window.PetWidget.onOpenMonitor(() => {
    window.electronAPI.launchMonitor();
  });

  window.PetWidget.onCameraToggle((enabled) => {
    window.electronAPI.setCameraEnabled(enabled);
  });

  // 鼠标穿透：实体元素上关闭穿透，透明区域开启穿透
  const petContainer = document.getElementById('pet-container');
  petContainer.addEventListener('mousemove', (e) => {
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const onSolid = target && target.closest && (
      target.closest('#pet-svg') ||
      target.closest('#ui-elements') ||
      target.closest('#speech-bubble') ||
      target.closest('#settings-menu')
    );
    window.electronAPI.setIgnoreMouseEvents(!onSolid);

    // 拖拽移动窗口
    if (isDragging) {
      const dx = e.screenX - dragStartX;
      const dy = e.screenY - dragStartY;
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      window.electronAPI.moveWindow(dx, dy);
    }
  });

  // 拖拽支持：在井盖/浣熊区域按住拖动
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;

  petContainer.addEventListener('mousedown', (e) => {
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const onDraggable = target && target.closest && (
      target.closest('#manhole') || target.closest('#raccoon')
    );
    if (onDraggable) {
      isDragging = true;
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      window.electronAPI.setIgnoreMouseEvents(false);
    }
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });
}
</script>
