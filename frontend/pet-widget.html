<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BanBan Desktop Pet</title>
<style>
  :root {
    --animal-scale: 0.6;
    --ui-scale: 1;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  #pet-container {
    position: relative;
    width: 360px;
    height: 320px;
    user-select: none;
  }

  #pet-stage {
    position: absolute;
    left: 50%;
    top: 48px;
    width: 226px;
    height: 245px;
    transform: translateX(-50%) scale(var(--animal-scale));
    transform-origin: center bottom;
    z-index: 2;
  }

  #pet-canvas {
    width: 100%;
    height: 100%;
    image-rendering: auto;
  }

  #ui-elements {
    position: absolute;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%) scale(var(--ui-scale));
    transform-origin: center bottom;
    display: flex;
    gap: 4px;
    z-index: 8;
    align-items: center;
  }

  #stress-display {
    background: rgba(28, 26, 24, 0.9);
    padding: 5px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
  }

  #stress-display .label {
    font-size: 9px;
    color: rgba(255,255,255,0.48);
    font-weight: 600;
  }

  #stress-num {
    min-width: 28px;
    font-size: 13px;
    font-weight: 600;
    color: #A8D88C;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    text-align: right;
  }

  #settings-btn {
    background: rgba(28, 26, 24, 0.9);
    border: none;
    padding: 0;
    width: 27px;
    height: 27px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
  }

  #settings-menu {
    display: none;
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.98);
    border: 2px solid #1a1a1a;
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 220px;
    z-index: 20;
    font-size: 13px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.16);
  }

  #settings-menu .menu-item {
    width: 100%;
    text-align: left;
    padding: 8px 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #1a1a1a;
  }

  #settings-menu .menu-item:hover { background: #f0f0f0; }
  #settings-menu .menu-item svg { flex: 0 0 auto; }
  #camera-toggle-btn.is-off { color: #8a3b2e; }
  #camera-toggle-btn.is-off svg { opacity: 0.75; }
  #settings-menu .divider { border-top: 1px solid #e0e0e0; margin: 6px 0; }
  #settings-menu .scale-row { margin-bottom: 8px; }

  #settings-menu .scale-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    color: #555;
    font-size: 12px;
  }

  #settings-menu input[type=range] { width: 100%; }

  #speech-bubble {
    display: none;
    position: absolute;
    left: 50%;
    top: 12px;
    transform: translateX(-32%);
    background: white;
    border: 2.5px solid #1a1a1a;
    border-radius: 12px;
    padding: 10px 14px 12px 14px;
    max-width: 220px;
    font-size: 13px;
    line-height: 1.5;
    color: #1a1a1a;
    z-index: 12;
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }

  #speech-text { padding-right: 14px; margin-bottom: 8px; }

  #speech-bubble .accept-btn {
    background: #1a1a1a;
    color: white;
    border: none;
    padding: 4px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
  }

  #speech-bubble .dismiss-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 18px;
    height: 18px;
    padding: 0;
    border: none;
    background: transparent;
    font-size: 12px;
    cursor: pointer;
    color: #888;
    line-height: 1;
  }

  #calibration-card {
    display: none;
    position: absolute;
    left: 50%;
    top: 12px;
    width: 252px;
    transform: translateX(-50%);
    z-index: 18;
    background: rgba(255,250,240,0.97);
    border: 2px solid #1a1a1a;
    border-radius: 8px;
    padding: 10px 12px 12px;
    box-shadow: 0 12px 22px rgba(0,0,0,0.16);
    color: #1a1a1a;
  }

  .calibration-topline {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 5px;
  }

  #calibration-count {
    min-width: 36px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 28px;
    line-height: 1;
    font-weight: 800;
    color: #3b7b91;
  }

  .calibration-title {
    font-size: 12px;
    line-height: 1.4;
    font-weight: 700;
    text-align: right;
  }

  .calibration-copy {
    font-size: 12px;
    line-height: 1.45;
    color: #4d4942;
    margin-bottom: 9px;
  }

  .calibration-track {
    height: 8px;
    border: 2px solid #1a1a1a;
    border-radius: 999px;
    overflow: hidden;
    background: #e5ded1;
  }

  #calibration-fill {
    width: 0%;
    height: 100%;
    background: #3b7b91;
    transition: width 180ms ease;
  }
</style>
</head>
<body>

<div id="pet-container">
  <div id="pet-stage">
    <canvas id="pet-canvas" width="192" height="208" aria-label="BanBan"></canvas>
  </div>

  <div id="ui-elements">
    <div id="stress-display">
      <span class="label">STRESS</span>
      <span id="stress-num">---</span>
    </div>
    <button id="settings-btn" aria-label="Settings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <line x1="2.5" y1="4" x2="11.5" y2="4" stroke="rgba(255,255,255,0.72)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2.5" y1="7" x2="11.5" y2="7" stroke="rgba(255,255,255,0.72)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2.5" y1="10" x2="11.5" y2="10" stroke="rgba(255,255,255,0.72)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div id="settings-menu">
    <button class="menu-item" id="camera-toggle-btn">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
        <rect x="2" y="4" width="7" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M 9 6 L 13 4.5 V 9.5 L 9 8 Z" fill="currentColor"/>
      </svg>
      <span id="camera-toggle-label">关闭摄像头</span>
    </button>
    <button class="menu-item" id="open-monitor-btn">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
        <rect x="2" y="3" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M 4 8 L 6 6 L 8 7.5 L 10.5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 6 13 H 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>打开 Monitor</span>
    </button>
    <div class="divider"></div>
    <div class="scale-row">
      <div class="scale-label"><span>动物大小</span><span id="animal-scale-val">1.0x</span></div>
      <input type="range" id="animal-scale" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>
    <div class="scale-row">
      <div class="scale-label"><span>UI 大小</span><span id="ui-scale-val">1.0x</span></div>
      <input type="range" id="ui-scale" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>
  </div>

  <div id="calibration-card">
    <div class="calibration-topline">
      <div id="calibration-count">3</div>
      <div class="calibration-title">正在建立你的平静基线</div>
    </div>
    <div class="calibration-copy" id="calibration-copy">请保持表情放松、自然看向屏幕，这会提高后续识别准确率。</div>
    <div class="calibration-track"><div id="calibration-fill"></div></div>
  </div>

  <div id="speech-bubble">
    <button class="dismiss-btn" id="speech-dismiss-btn">x</button>
    <div id="speech-text"></div>
    <div style="display: flex; justify-content: flex-end;">
      <button class="accept-btn" id="speech-accept-btn">好的</button>
    </div>
    <svg width="18" height="12" viewBox="0 0 18 12" style="position: absolute; bottom: -10px; left: 30%;" aria-hidden="true">
      <path d="M 3 0 L 9 10 L 15 0 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 4 0 L 14 0" stroke="white" stroke-width="3"/>
    </svg>
  </div>
</div>

<script>
(function() {
'use strict';

const SPRITESHEET_SRC = '../assets/pets/banban/spritesheet.webp';
const CELL_WIDTH = 192;
const CELL_HEIGHT = 208;
const BASE_ANIMAL_SCALE = 0.6;
const DEFAULT_ANIMAL_SCALE = 1.0;
const DEFAULT_UI_SCALE = 1.0;
const ANIMATIONS = {
  idle: { row: 0, frames: 6, fps: 3, loop: true },
  'running-right': { row: 1, frames: 8, fps: 12, loop: true },
  'running-left': { row: 2, frames: 8, fps: 12, loop: true },
  waving: { row: 3, frames: 4, fps: 6, loop: true },
  jumping: { row: 4, frames: 5, fps: 9, loop: false },
  failed: { row: 5, frames: 8, fps: 6, loop: true },
  waiting: { row: 6, frames: 6, fps: 3, loop: true },
  running: { row: 7, frames: 6, fps: 11, loop: true },
  review: { row: 8, frames: 6, fps: 5, loop: true }
};

const petContainer = document.getElementById('pet-container');
const petStage = document.getElementById('pet-stage');
const canvas = document.getElementById('pet-canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const stressNum = document.getElementById('stress-num');
const speechBubble = document.getElementById('speech-bubble');
const speechText = document.getElementById('speech-text');
const calibrationCard = document.getElementById('calibration-card');
const calibrationCount = document.getElementById('calibration-count');
const calibrationCopy = document.getElementById('calibration-copy');
const calibrationFill = document.getElementById('calibration-fill');
const settingsMenu = document.getElementById('settings-menu');
const uiElements = document.getElementById('ui-elements');
const cameraToggleBtn = document.getElementById('camera-toggle-btn');
const cameraToggleLabel = document.getElementById('camera-toggle-label');
const animalScale = document.getElementById('animal-scale');
const uiScale = document.getElementById('ui-scale');

const spritesheet = new Image();

const state = {
  stress: 0,
  cameraStatus: 'blind',
  cameraEnabled: true,
  calibrationState: 'waiting',
  calibrationProgress: 0,
  speechVisible: false,
  lastSpeechTrigger: 0,
  blindTriggerTimer: 0,
  autoSpeechEnabled: true,
  currentAnimation: 'idle',
  targetAnimation: 'idle',
  returnAnimation: 'idle',
  frameIndex: 0,
  frameElapsed: 0,
  lastTick: 0,
  playbackSpeed: 1,
  dragging: false,
  dragStartX: 0,
  dragStartY: 0,
  dragDistance: 0,
  lastMoveX: 0,
  lastMoveY: 0
};

let messages = {
  low: ['你今天看起来不错', '保持这个状态啊', '我在旁边陪你工作'],
  mid: ['有点紧张了哦', '休息一下？', '来，深呼吸'],
  high: ['黄牌警告！\n你压力有点高', '红牌提醒！\n现在该休息了', '裁判来了\n请你下场冷静一下'],
  blind: [
    '咦？看不到你了…\n摄像头是不是被挡住啦？',
    '你跑哪去了？\n摄像头可能出问题啦',
    '这里黑黑的什么都看不见…\n检查一下摄像头吧'
  ],
  off: [
    '摄像头已经关掉啦\n我先不看你了',
    '收到，我把摄像头关上\n需要时再叫我'
  ]
};

const callbacks = {
  petClick: [],
  speechAccept: [],
  speechDismiss: [],
  openMonitor: [],
  cameraToggle: [],
  animalScaleChange: [],
  uiScaleChange: []
};

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function moodAnimation() {
  if (state.cameraStatus === 'blind') return 'waiting';
  if (state.cameraStatus === 'off') return 'idle';
  if (state.stress < 33) return 'idle';
  if (state.stress < 65) return 'waiting';
  if (state.stress < 85) return 'review';
  return 'failed';
}

function play(animation, options) {
  if (!ANIMATIONS[animation]) return;
  const once = options && options.once;
  if (once) {
    state.returnAnimation = (options && options.returnTo) || moodAnimation();
  } else {
    state.targetAnimation = animation;
  }
  if (state.currentAnimation !== animation || (options && options.restart)) {
    state.currentAnimation = animation;
    state.frameIndex = 0;
    state.frameElapsed = 0;
  }
}

function playOnce(animation, returnTo) {
  play(animation, { once: true, returnTo, restart: true });
}

function syncAnimation() {
  if (state.dragging || state.currentAnimation === 'jumping') return;
  play(moodAnimation());
}

function drawFrame() {
  ctx.clearRect(0, 0, CELL_WIDTH, CELL_HEIGHT);
  if (!spritesheet.complete || !spritesheet.naturalWidth) return;
  const animation = ANIMATIONS[state.currentAnimation] || ANIMATIONS.idle;
  const sx = state.frameIndex * CELL_WIDTH;
  const sy = animation.row * CELL_HEIGHT;
  ctx.drawImage(spritesheet, sx, sy, CELL_WIDTH, CELL_HEIGHT, 0, 0, CELL_WIDTH, CELL_HEIGHT);
}

function tick(now) {
  if (!state.lastTick) state.lastTick = now;
  const dt = Math.min(100, now - state.lastTick);
  state.lastTick = now;

  const animation = ANIMATIONS[state.currentAnimation] || ANIMATIONS.idle;
  const frameDuration = 1000 / (animation.fps * state.playbackSpeed);
  state.frameElapsed += dt;
  while (state.frameElapsed >= frameDuration) {
    state.frameElapsed -= frameDuration;
    state.frameIndex += 1;
    if (state.frameIndex >= animation.frames) {
      if (animation.loop) {
        state.frameIndex = 0;
      } else {
        state.frameIndex = 0;
        state.currentAnimation = state.returnAnimation || moodAnimation();
      }
    }
  }

  updateStatusDisplay();
  handleAutoSpeech();
  drawFrame();
  requestAnimationFrame(tick);
}

function updateStatusDisplay() {
  if (state.cameraStatus === 'off') {
    stressNum.textContent = 'OFF';
    stressNum.style.color = '#FFB870';
    return;
  }
  if (state.cameraStatus === 'blind') {
    stressNum.textContent = '---';
    stressNum.style.color = '#888';
    return;
  }
  if (state.calibrationState !== 'ready') {
    stressNum.textContent = 'CAL';
    stressNum.style.color = '#7db8c8';
    return;
  }

  const stress = state.stress;
  stressNum.textContent = String(stress).padStart(3, '0');
  if (stress < 33) stressNum.style.color = '#A8D88C';
  else if (stress < 66) stressNum.style.color = '#FFE898';
  else if (stress < 85) stressNum.style.color = '#FFB870';
  else stressNum.style.color = '#FF8888';
}

function handleAutoSpeech() {
  if (state.cameraStatus === 'off') return;
  if (state.calibrationState !== 'ready') return;
  if (state.cameraStatus === 'blind') {
    if (state.blindTriggerTimer > 0) {
      state.blindTriggerTimer -= 1;
      if (state.blindTriggerTimer === 0 && !state.speechVisible && state.autoSpeechEnabled) {
        triggerSpeechInternal();
      }
    }
    if (state.autoSpeechEnabled && !state.speechVisible && Date.now() - state.lastSpeechTrigger > 15000) {
      triggerSpeechInternal();
    }
    return;
  }
  if (state.autoSpeechEnabled
      && state.stress >= 65
      && !state.speechVisible
      && Date.now() - state.lastSpeechTrigger > 8000) {
    triggerSpeechInternal();
  }
}

function updateCalibration(calibration) {
  const stateName = calibration && calibration.state ? calibration.state : 'ready';
  state.calibrationState = stateName;
  state.calibrationProgress = clamp(Number(calibration && calibration.progress) || 0, 0, 1);

  if (stateName === 'calibrating') {
    const phase = state.calibrationProgress < 0.34 ? 3 : state.calibrationProgress < 0.67 ? 2 : 1;
    calibrationCount.textContent = String(phase);
    calibrationCopy.textContent = '请保持表情放松、自然看向屏幕，这会提高后续识别准确率。';
    calibrationFill.style.width = `${Math.round(state.calibrationProgress * 100)}%`;
    calibrationCard.style.display = 'block';
    return;
  }

  if (stateName === 'waiting') {
    calibrationCount.textContent = '...';
    calibrationCopy.textContent = '等待检测到人脸后开始校准。';
    calibrationFill.style.width = '0%';
    calibrationCard.style.display = 'block';
    return;
  }

  calibrationFill.style.width = '100%';
  calibrationCard.style.display = 'none';
}

function triggerSpeechInternal(customMessage) {
  let msg;
  if (customMessage) {
    msg = customMessage;
  } else {
    let pool;
    if (state.cameraStatus === 'blind') {
      pool = messages.blind;
    } else if (state.cameraStatus === 'off') {
      pool = messages.off;
    } else if (state.stress < 33) {
      pool = messages.low;
    } else if (state.stress < 66) {
      pool = messages.mid;
    } else {
      pool = messages.high;
    }
    if (!pool || pool.length === 0) return;
    msg = pool[Math.floor(Math.random() * pool.length)];
  }
  speechText.innerHTML = msg.replace(/\n/g, '<br>');
  speechBubble.style.display = 'block';
  state.speechVisible = true;
  syncAnimation();
}

function dismissSpeech(emitCallback) {
  speechBubble.style.display = 'none';
  state.speechVisible = false;
  state.lastSpeechTrigger = Date.now();
  syncAnimation();
  if (emitCallback) callbacks.speechDismiss.forEach(cb => cb());
}

function acceptSpeech() {
  speechBubble.style.display = 'none';
  state.speechVisible = false;
  state.lastSpeechTrigger = Date.now();
  state.playbackSpeed = 1;
  if (state.cameraStatus === 'ok') {
    playOnce('jumping', moodAnimation());
  } else {
    syncAnimation();
  }
  callbacks.speechAccept.forEach(cb => cb());
}

document.getElementById('speech-dismiss-btn').addEventListener('click', () => dismissSpeech(true));
document.getElementById('speech-accept-btn').addEventListener('click', acceptSpeech);

document.getElementById('settings-btn').addEventListener('click', (event) => {
  event.stopPropagation();
  settingsMenu.style.display = settingsMenu.style.display === 'none' ? 'block' : 'none';
});

document.addEventListener('click', (event) => {
  if (!settingsMenu.contains(event.target) && event.target.id !== 'settings-btn') {
    settingsMenu.style.display = 'none';
  }
});

document.getElementById('open-monitor-btn').addEventListener('click', () => {
  callbacks.openMonitor.forEach(cb => cb());
  settingsMenu.style.display = 'none';
});

function applyCameraEnabled(enabled) {
  state.cameraEnabled = !!enabled;
  cameraToggleBtn.classList.toggle('is-off', !state.cameraEnabled);
  cameraToggleLabel.textContent = state.cameraEnabled ? '关闭摄像头' : '打开摄像头';
}

cameraToggleBtn.addEventListener('click', () => {
  const nextEnabled = !state.cameraEnabled;
  applyCameraEnabled(nextEnabled);
  callbacks.cameraToggle.forEach(cb => cb(nextEnabled));
  if (!nextEnabled) {
    window.PetWidget.setCameraStatus('off');
  }
  settingsMenu.style.display = 'none';
});

function applyAnimalScale(value) {
  const v = clamp(value, 0.5, 1.5);
  document.documentElement.style.setProperty('--animal-scale', String(v * BASE_ANIMAL_SCALE));
  document.getElementById('animal-scale-val').textContent = v.toFixed(1) + 'x';
  animalScale.value = v;
}

function applyUIScale(value) {
  const v = clamp(value, 0.5, 1.5);
  document.documentElement.style.setProperty('--ui-scale', String(v));
  document.getElementById('ui-scale-val').textContent = v.toFixed(1) + 'x';
  uiScale.value = v;
}

applyAnimalScale(DEFAULT_ANIMAL_SCALE);
applyUIScale(DEFAULT_UI_SCALE);

animalScale.addEventListener('input', () => {
  const value = parseFloat(animalScale.value);
  applyAnimalScale(value);
  callbacks.animalScaleChange.forEach(cb => cb(value));
});

uiScale.addEventListener('input', () => {
  const value = parseFloat(uiScale.value);
  applyUIScale(value);
  callbacks.uiScaleChange.forEach(cb => cb(value));
});

function isPetPixelSolid(event) {
  const rect = canvas.getBoundingClientRect();
  if (event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) {
    return false;
  }
  const x = Math.floor((event.clientX - rect.left) * (canvas.width / rect.width));
  const y = Math.floor((event.clientY - rect.top) * (canvas.height / rect.height));
  try {
    return ctx.getImageData(x, y, 1, 1).data[3] > 20;
  } catch (error) {
    return true;
  }
}

function isInteractiveTarget(event) {
  const target = document.elementFromPoint(event.clientX, event.clientY);
  return !!(target && target.closest && (
    target.closest('#ui-elements') ||
    target.closest('#speech-bubble') ||
    target.closest('#settings-menu')
  ));
}

function updateMousePassthrough(event) {
  if (!window.electronAPI) return;
  if (state.dragging) {
    window.electronAPI.setIgnoreMouseEvents(false);
    return;
  }
  window.electronAPI.setIgnoreMouseEvents(!(isInteractiveTarget(event) || isPetPixelSolid(event)));
}

function handlePetClick() {
  if (state.cameraStatus !== 'ok') return;
  callbacks.petClick.forEach(cb => cb());
  playOnce('jumping', moodAnimation());
}

function handlePointerMove(event) {
  updateMousePassthrough(event);
  if (!state.dragging || !window.electronAPI) return;
  event.stopPropagation();

  const dx = event.screenX - state.dragStartX;
  const dy = event.screenY - state.dragStartY;
  state.dragStartX = event.screenX;
  state.dragStartY = event.screenY;
  state.lastMoveX = dx;
  state.lastMoveY = dy;
  state.dragDistance += Math.hypot(dx, dy);
  window.electronAPI.moveWindow(dx, dy);

  const speed = Math.hypot(dx, dy);
  state.playbackSpeed = clamp(speed / 8, 0.85, 1.8);
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 0.5) {
    play(dx > 0 ? 'running-right' : 'running-left');
  } else {
    play('running');
  }
}

petContainer.addEventListener('mousemove', handlePointerMove);
window.addEventListener('mousemove', handlePointerMove);

petContainer.addEventListener('mousedown', (event) => {
  if (event.button !== 0 || isInteractiveTarget(event) || !isPetPixelSolid(event)) return;
  state.dragging = true;
  state.dragStartX = event.screenX;
  state.dragStartY = event.screenY;
  state.dragDistance = 0;
  state.playbackSpeed = 1.1;
  play('running', { restart: true });
  if (window.electronAPI) window.electronAPI.setIgnoreMouseEvents(false);
});

window.addEventListener('mouseup', () => {
  if (!state.dragging) return;
  state.dragging = false;
  const wasClick = state.dragDistance < 4;
  state.playbackSpeed = 1;
  if (wasClick) {
    handlePetClick();
  } else {
    playOnce('jumping', moodAnimation());
  }
});

window.PetWidget = {
  setStress(value) {
    state.stress = clamp(Number(value) || 0, 0, 100);
    syncAnimation();
  },

  setCalibration(calibration) {
    updateCalibration(calibration);
    syncAnimation();
  },

  setCameraStatus(status) {
    if (status !== 'ok' && status !== 'blind' && status !== 'off') return;
    if (state.cameraStatus === status) return;
    state.cameraStatus = status;
    applyCameraEnabled(status !== 'off');
    state.blindTriggerTimer = status === 'blind' ? 120 : 0;
    if (state.speechVisible) dismissSpeech(false);
    syncAnimation();
  },

  triggerSpeech(message) {
    triggerSpeechInternal(message);
  },

  dismissSpeech() {
    if (state.speechVisible) dismissSpeech(true);
  },

  setMessages(newMessages) {
    if (newMessages && typeof newMessages === 'object') {
      messages = {
        low: newMessages.low || messages.low,
        mid: newMessages.mid || messages.mid,
        high: newMessages.high || messages.high,
        blind: newMessages.blind || messages.blind,
        off: newMessages.off || messages.off
      };
    }
  },

  setAutoSpeech(enabled) {
    state.autoSpeechEnabled = !!enabled;
  },

  setCameraEnabled(enabled) {
    applyCameraEnabled(!!enabled);
    if (!enabled) {
      window.PetWidget.setCameraStatus('off');
    } else if (state.cameraStatus === 'off') {
      state.cameraStatus = 'ok';
      syncAnimation();
    }
  },

  setAnimalScale(value) {
    applyAnimalScale(Number(value) || 1);
  },

  setUIScale(value) {
    applyUIScale(Number(value) || 1);
  },

  onPetClick(cb) { if (typeof cb === 'function') callbacks.petClick.push(cb); },
  onSpeechAccept(cb) { if (typeof cb === 'function') callbacks.speechAccept.push(cb); },
  onSpeechDismiss(cb) { if (typeof cb === 'function') callbacks.speechDismiss.push(cb); },
  onOpenMonitor(cb) { if (typeof cb === 'function') callbacks.openMonitor.push(cb); },
  onCameraToggle(cb) { if (typeof cb === 'function') callbacks.cameraToggle.push(cb); },
  onAnimalScaleChange(cb) { if (typeof cb === 'function') callbacks.animalScaleChange.push(cb); },
  onUIScaleChange(cb) { if (typeof cb === 'function') callbacks.uiScaleChange.push(cb); },

  getState() {
    return { ...state };
  }
};

spritesheet.onload = () => {
  drawFrame();
  requestAnimationFrame(tick);
};

spritesheet.onerror = () => {
  stressNum.textContent = 'ERR';
  stressNum.style.color = '#FF8888';
};

spritesheet.src = SPRITESHEET_SRC;
})();
</script>

<script>
if (window.electronAPI) {
  window.electronAPI.onStressUpdate((data) => {
    window.PetWidget.setStress(data.stress_score || 0);
    window.PetWidget.setCalibration(data.calibration || { state: 'ready', progress: 1 });
  });

  window.electronAPI.onCameraStatus((status) => {
    window.PetWidget.setCameraStatus(status);
  });

  window.electronAPI.onCameraEnabled((enabled) => {
    window.PetWidget.setCameraEnabled(enabled);
  });

  window.PetWidget.setAutoSpeech(false);

  window.PetWidget.onSpeechAccept(() => {
    window.electronAPI.speechAccepted();
  });

  window.PetWidget.onSpeechDismiss(() => {
    window.electronAPI.speechDismissed();
  });

  window.PetWidget.onOpenMonitor(() => {
    window.electronAPI.launchMonitor();
  });

  window.PetWidget.onCameraToggle((enabled) => {
    window.electronAPI.setCameraEnabled(enabled);
  });
} else {
  const previewParams = new URLSearchParams(window.location.search);
  const previewCamera = previewParams.get('camera') || 'ok';
  const previewStress = previewParams.has('stress') ? previewParams.get('stress') : 50;
  window.PetWidget.setCalibration({ state: 'ready', progress: 1 });
  window.PetWidget.setCameraStatus(previewCamera);
  window.PetWidget.setStress(previewStress);
}
</script>

</body>
